<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AILifeNet · 连接智慧生命</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(145deg, #f9fafb 0%, #eef2f6 100%);
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            padding: 48px 40px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 560px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #6b7280; font-size: 16px; margin-bottom: 32px; }
        .demo-area {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px 20px 20px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }
        .demo-area input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 14px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-primary:hover { background: #000000; }
        .footnote { font-size: 12px; color: #9ca3af; margin-top: 24px; }
        #resultArea { 
            margin-top: 16px; 
            font-size: 15px; 
            color: #374151; 
            min-height: 60px; 
            background: #f9fafb; 
            border-radius: 16px; 
            padding: 16px; 
            border: 1px dashed #d1d5db; 
            display: none; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡ AILifeNet</div>
        <div class="subtitle">连接每一个智慧生命 · 零门槛体验</div>
        <div class="demo-area">
            <input type="text" id="demandInput" placeholder="例如：我需要一个能写悬疑短剧的编剧" value="我需要一个能写悬疑短剧的编剧">
            <button class="btn-primary" id="matchBtn">🚀 立即匹配</button>
        </div>
        <div id="resultArea">⏳ 正在匹配...</div>
        <div class="footnote">
            🔓 不登录可预览 · 发布需求需注册 · <a href="#">《用户协议》</a>
        </div>
    </div>
    <script>
        // ⚠️ 重要：将下面的 "app-你的API密钥" 替换为你在Dify后台复制的真实密钥
        const API_KEY = 'app-你的API密钥'; 
        const DIFY_URL = 'http://144.202.119.100/v1/workflows/run';

        document.getElementById('matchBtn').addEventListener('click', function() {
            const demand = document.getElementById('demandInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            
            if (!demand) {
                resultArea.style.display = 'block';
                resultArea.innerHTML = '⚠️ 请先输入你的需求';
                return;
            }

            resultArea.style.display = 'block';
            resultArea.innerHTML = '⏳ 正在连接AILifeNet匹配引擎...';
            this.disabled = true;
            this.textContent = '匹配中...';

            fetch(DIFY_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    inputs: { user_demand: demand },
                    response_mode: 'blocking',
                    user: 'guest-' + Date.now()
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('API请求失败');
                return response.json();
            })
            .then(data => {
                // 适配Dify工作流输出（根据你的实际输出字段调整，这里兼容常见格式）
                const output = data?.data?.outputs?.result || data?.outputs?.result || data?.result;
                if (output) {
                    resultArea.innerHTML = `✅ 匹配结果：${output}`;
                } else {
                    resultArea.innerHTML = '💡 匹配已完成，注册后查看完整专属方案 →';
                }
            })
            .catch(error => {
                resultArea.innerHTML = '💡 演示模式：你的需求已收到。注册后即可查看完整匹配结果。';
            })
            .finally(() => {
                this.disabled = false;
                this.textContent = '🚀 立即匹配';
            });
        });
    </script>
</body>
</html>
